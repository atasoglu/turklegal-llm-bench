tag:
  - turklegal
task: turklegal_bench
dataset_path: atasoglu/turklegal-llm-bench
dataset_name: default
output_type: generate_until
training_split: train
validation_split: validation
test_split: test
doc_to_text: "Aşağıdaki Türk hukuku sorusunu yanıtlayın. Sadece doğru seçeneğin harfini yazın (A, B, C veya D).\n\nSoru: {{question}}\nA. {{choices.text[0]}}\nB. {{choices.text[1]}}\nC. {{choices.text[2]}}\nD. {{choices.text[3]}}\nCevap:"
doc_to_target: "{{answerKey}}"
generation_kwargs:
  until:
    - "\n"
    - "."
    - ":"
  do_sample: false
  temperature: 0.0
  max_gen_toks: 8
repeats: 1
num_fewshot: 0
filter_list:
  - name: "strict-match"
    filter:
      - function: "regex"
        regex_pattern: "([ABCD])"
      - function: "take_first"
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
metadata:
  version: 1.0
